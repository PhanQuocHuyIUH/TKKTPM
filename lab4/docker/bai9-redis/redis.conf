# Redis Custom Configuration

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Timeout (0 = disabled)
timeout 0

# TCP keepalive
tcp-keepalive 300

# Database count
databases 16
